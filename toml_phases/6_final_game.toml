  { type = "paragraph", content = "*This is it. This is the moment everything breaks.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"It's none of your business.\"", targetType = "node", nodeId = "story_brothers_discover.independent", effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = -3 }, { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = -2 }, { targetType = "player", trait = "confidence", op = "add", value = 5 } ], flagEffects = [ { targetType = "player", flag = "brothers_discover" }, { targetType = "player", flag = "crisis_resolved" } ] }, { text = "\"Please don't fight.\"", targetType = "node", nodeId = "story_brothers_discover.peacemaker", effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = -1 }, { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = -1 }, { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 1 } ], flagEffects = [ { targetType = "player", flag = "brothers_discover" }, { targetType = "player", flag = "crisis_resolved" } ] }, { text = "(Say nothing. Walk away.)", targetType = "node", nodeId = "story_brothers_discover.avoidant", effects = [ { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = -3 }, { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = -3 }, { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 2 } ], flagEffects = [ { targetType = "player", flag = "brothers_discover" }, { targetType = "player", flag = "crisis_resolved" } ] } ] }

[[canvases.nodes]]
id = "independent"
name = "None of Your Business"
blocks = [
  { type = "paragraph", content = "Both brothers stare at her. The silence is loud." },
  { type = "paragraph", content = "@ryan uncrosses his arms. Not angry — stunned. Nobody talks to Ryan like that." },
  { type = "paragraph", content = "@jake looks at his feet. Then at her. Something in his eyes shifts — fear to something else. Admiration, maybe." },
  { type = "dialog", content = "I didn't know you had that in you.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "She walks between them. Doesn't touch either one. Goes to her room. Closes the door." },
  { type = "paragraph", content = "Through the wall: silence. Then @ryan's boots going downstairs. Then @jake's door closing. Nobody fights tonight." },
  { type = "paragraph", content = "*I don't belong to either of them. They needed to hear it. I needed to say it.*" }
]
exit_block = { type = "location", text = "Close the door.", config = { destinationType = "trigger", time_progression_minutes = 30 } }

[[canvases.nodes]]
id = "peacemaker"
name = "Please Don't Fight"
blocks = [
  { type = "paragraph", content = "Her voice cracks. Both brothers look at her instead of each other." },
  { type = "paragraph", content = "@jake's hand finds the doorframe. Holding on." },
  { type = "paragraph", content = "@ryan takes a step back. Unclenches his fists. He didn't know they were clenched." },
  { type = "dialog", content = "Nobody's fighting.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "A lie. But a necessary one. The hallway breathes." },
  { type = "paragraph", content = "@jake goes back inside. Closes his door. Quietly." },
  { type = "paragraph", content = "@ryan stands there a moment longer. Looks at her. Then walks downstairs. She hears the front door open and close. His truck starts." },
  { type = "paragraph", content = "*Fragile peace. Everyone pretending. But nobody bled.*" }
]
exit_block = { type = "location", text = "Go to your room.", config = { destinationType = "trigger", time_progression_minutes = 30 } }

[[canvases.nodes]]
id = "avoidant"
name = "Walk Away"
blocks = [
  { type = "paragraph", content = "She turns. Walks to her room. Doesn't look back." },
  { type = "paragraph", content = "Behind her: silence. Then voices. Low at first." },
  { type = "paragraph", content = "Through her closed door: @ryan's voice getting louder. @jake's getting quieter. A thud. Something falls off a shelf." },
  { type = "dialog", content = "You little—", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "Another thud." },
  { type = "dialog", content = "Don't—", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "Boots on the stairs." },
  { type = "dialog", content = "ENOUGH.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "Silence. The kind that comes after something breaks." },
  { type = "paragraph", content = "She lies in bed. Through the wall: @jake crying. Trying not to. Failing." },
  { type = "paragraph", content = "*I walked away. I let them fight. I don't know if that makes me smart or a coward.*" }
]
