  { type = "dialog", content = "You were fine.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "dialog", content = "I know. That's why you didn't talk.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "The storm fades. The candles get lower. Nobody moves to check the breaker." },
  { type = "paragraph", content = "She looks at them — @frank with his whiskey, @ryan sprawled on the couch, @jake drawing by dying light. For one moment she sees them clearly: just three men in a house that's too quiet, each carrying something they don't talk about." },
  { type = "group", blocks = [
