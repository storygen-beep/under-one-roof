  { type = "image", props = { file = "story/story_brothers_discover_discovery.jpg", search_queries = ["hallway confrontation night three people tension siblings"] } },
  { type = "dialog", content = "Both of us?", props = { speaker = "npc", npcId = "npc_ryan" } },
