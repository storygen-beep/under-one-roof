  { type = "paragraph", content = "Her. Sleeping. The shirt riding up. Her face slack, mouth slightly open. Drawn with the same care as the creek at sunset." },
  { type = "paragraph", content = "Behind it: another. Her reaching for something on a high shelf. Her back arched. The tank top pulling." },
  { type = "paragraph", content = "Another. Her towel slipping. The bathroom. She didn't know he saw that." },
  { type = "image", props = { file = "story/story_jake_secret_sketches_discovery.jpg", search_queries = ["intimate charcoal sketches woman sleeping reaching drawings hidden"] } },
  { type = "paragraph", content = "He's been watching. Drawing her when she wasn't looking. Poses she never held for him. Moments she thought were private." },
  { type = "paragraph", content = "The shower stops. Footsteps in the hallway. He opens the door. Sees her holding the drawings." },
  { type = "paragraph", content = "His face goes white." },
