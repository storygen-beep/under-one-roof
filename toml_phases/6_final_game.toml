  { type = "image", props = { file = "story/story_ryan_map.jpg", search_queries = ["woman alone pickup truck searching seat", "truck interior woman searching under seat"] } },
  { type = "paragraph", content = "Her phone slips between the seats. She reaches under the bench to grab it. Her fingers find something else." },
  { type = "paragraph", content = "A folder. Manila, bent at the corners. Inside: a road map with a city circled in red marker. Highway routes highlighted. A printed email — job offer letterhead, a company she doesn't recognize." },
  { type = "paragraph", content = "She reads it. Construction foreman. His own crew. Start date six weeks from now. Salary that's three times what Frank pays." },
  { type = "paragraph", content = "Under the email: a handwritten list. Things to pack. Things to sell. 'Tell Dad' at the bottom, circled twice, with a question mark." },
  { type = "paragraph", content = "*He's leaving. Not someday. Soon. And 'Tell Dad' has a question mark because he's not sure he will.*" },
  { type = "paragraph", content = "The gas station door opens. He's walking back with two coffees. He sees her face. Then the folder in her hands." },
  { type = "paragraph", content = "The coffees stop. His grin dies." },
  { type = "dialog", content = "That wasn't— you shouldn't have seen that.", props = { speaker = "npc", npcId = "npc_ryan" } }
]
