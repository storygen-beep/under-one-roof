[[canvases.nodes]]
id = "tender"
name = "Beautiful"
blocks = [
  { type = "paragraph", content = "His mouth opens. Closes. He wasn't expecting that." },
  { type = "dialog", content = "You're not— angry?", props = { speaker = "player" } },
  { type = "paragraph", content = "She holds the drawings carefully. The one of her sleeping — the care in the linework, the attention to how light falls on her cheekbone." },
  { type = "dialog", content = "You see me like this? This is how you see me?", props = { speaker = "player" } },
  { type = "paragraph", content = "His eyes are wet. He nods. The boy who can't finish sentences just said everything without a word." },
  { type = "paragraph", content = "*He's been watching. But not like Ryan watches — not measuring, not wanting. Memorizing. Like I might disappear and he needs proof I was real.*" }
]
