[[canvases.nodes]]
id = "base"
name = "The Whole Story"
blocks = [
  { type = "paragraph", content = "Parked. Somewhere she's never been — a lookout point off the back highway. The valley below. Farmland and distant lights." },
  { type = "image", props = { file = "story/story_ryan_truth.jpg", search_queries = ["couple parked lookout point truck talking", "truck parked overlook couple talking night"] } },
  { type = "paragraph", content = "@ryan turns the engine off. Sits. Both hands on the wheel like he's still driving." },
  { type = "dialog", content = "I'm twenty-three.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He says it like a diagnosis." },
  { type = "dialog", content = "Twenty-three. Dad's house. Dad's truck. Dad's jobs. Dad's roads. I know every back road in this county because I've been driving them since I was sixteen and nothing's changed.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He pulls up his sleeve. The scar on his forearm — faded, but the raised line catches the light." },
  { type = "dialog", content = "Eighteen. Job site. Board slipped off the saw table and I caught it with my arm instead of letting it fall. Know why? Because Dad's clients were watching. Because if I let it fall, it'd cost us a day. I was eighteen and I took a board to the arm so Frank Harmon's deadline wouldn't slip.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "His voice is steady. Not angry. Just tired." },
  { type = "dialog", content = "That's the day I knew. If I don't leave, I'm him. Forty-five, this house, these roads, until the house falls down.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He looks at her." },
  { type = "dialog", content = "The job is real. My own crew. Real money. I leave before your mom gets back. Nobody needs to know until I'm gone.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "*He's been carrying this the whole time. The detours, the phone calls, the map. All of it was him building an exit while I was falling into the house.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Why didn't you tell me?\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = 2 }, { targetType = "npc", npcId = "npc_ryan", trait = "trust", op = "add", value = 2 } ], flagEffects = [{ targetType = "player", flag = "ryan_leaving_confirmed" }] }, { text = "\"When?\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "trust", op = "add", value = 3 }, { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "ryan_leaving_confirmed" }] } ] }

