blocks = [
  { type = "paragraph", content = "Truck. The lookout point again. He drove here on purpose. Engine off. Radio off." },
  { type = "image", props = { file = "story/story_ryan_ultimatum.jpg", search_queries = ["man woman truck lookout serious talk", "couple truck lookout point serious conversation"] } },
  { type = "paragraph", content = "@ryan doesn't look at the valley this time. He looks at her." },
  { type = "paragraph", content = "He's not performing. No grin. No testing. The version of Ryan that exists underneath all of it." },
  { type = "dialog", content = "I leave in ten days.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "A breath." },
  { type = "dialog", content = "Come with me.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "Not a dare. Not a negotiation. Not leverage. A man sitting in his truck asking someone to choose him over everything else." },
  { type = "paragraph", content = "The valley below is getting dark. The farmland lights are coming on one by one." },
  { type = "paragraph", content = "*He's not asking me to run away. He's asking me to run toward something. With him.*" }
]
