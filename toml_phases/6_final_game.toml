# ─── BEAT 1: ARRIVAL ───

[[canvases]]
id = "opening_arrival"
name = "One Suitcase"
description = "Lily arrives at the Harmon property. One suitcase, three strangers, fifty-six days."

[canvases.trigger]
location = "loc_hallway"
is_repeatable = false
priority = 10
is_active = true

[[canvases.nodes]]
id = "base"
name = "The Taxi"
blocks = [
  { type = "paragraph", content = "The taxi smells like pine air freshener and someone else's cigarettes. Forty minutes from campus. She's counted every mile." },
  { type = "image", props = { file = "story/opening_arrival_taxi.jpg", search_queries = ["young woman taxi backseat rural road suitcase", "woman car window rural countryside evening"] } },
  { type = "paragraph", content = "Three weeks ago: the call from housing. Water damage. Dorm condemned. Four hundred dollars in her account and nowhere to go." },
  { type = "paragraph", content = "Mom's voice on the phone, Dubai static crackling: '@diana said you can stay with @frank. His boys are there but they're good boys. It's just until I'm back. Fifty-six days.'" },
  { type = "paragraph", content = "@frank. Mom's husband. Met him at the wedding — twice. Firm handshake, didn't talk much. A contractor with a property outside town." },
  { type = "paragraph", content = "His sons: @ryan, 23 — something about construction, trucks, the gym. @jake, 20 — art student, quiet, draws. She's never met either of them." },
  { type = "paragraph", content = "*Three men. One bathroom. Thin walls. Fifty-six days.*" },
  { type = "paragraph", content = "The taxi turns onto gravel." }
]
exit_block = { type = "choices", choices = [ { text = "Here we go.", targetType = "node", nodeId = "opening_arrival.arrival" } ] }

[[canvases.nodes]]
id = "arrival"
name = "The House"
blocks = [
  { type = "paragraph", content = "Gravel crunching under tires. The taxi driver doesn't get out — just pops the trunk and waits. One suitcase. She'd packed light on purpose, like packing light might make this temporary." },
  { type = "paragraph", content = "The house is bigger than she remembered from the wedding. Clapboard siding, a wraparound porch with paint peeling at the edges. The workshop out back. Fields beyond that. No neighbors close enough to wave at." },
  { type = "image", props = { file = "story/opening_arrival_the_drive.jpg", search_queries = ["rural farmhouse isolated gravel driveway suitcase arrival dusk"] } },
  { type = "paragraph", content = "The front door opens before she knocks." },
  { type = "paragraph", content = "Kitchen. @frank is at the stove. Sleeves rolled. The smell of garlic and something burning slightly. @jake is at the table with his sketchbook — he stands when she walks in, awkward, adjusts his glasses." },
  { type = "dialog", content = "You must be exhausted. Dinner's in ten.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "Firm handshake. Calloused hand that swallows hers. He's bigger than she remembered. Steady dark eyes that don't blink." },
  { type = "paragraph", content = "A door slams somewhere in the house. Boots on hardwood. @ryan fills the hallway doorframe — tank top, arms that don't fit, cocky grin already loaded." },
  { type = "dialog", content = "So you're the new roommate.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He looks at her like she's a new piece of furniture. Interesting. Temporary." },
  { type = "paragraph", content = "@jake hasn't said a word. He smiled, looked at his shoes, and went back to drawing. His pencil hasn't stopped moving since she walked in." },
  { type = "paragraph", content = "*Fifty-six days. I can do fifty-six days.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Nice to meet everyone.\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 1 }, { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "game_started" }] }, { text = "\"Where's my room?\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "game_started" }] } ] }

# ─── BEAT 1B: UNPACKING ───

[[canvases]]
id = "story_unpacking"
name = "Unpacking"
description = "First night. One suitcase. The room that will be home for fifty-six days."

[canvases.trigger]
location = "loc_lily_room"
is_repeatable = false
priority = 10
is_active = true
conditions = { version = "1.0", items = [
  { type = "flag", subject = "player", flag_key = "game_started", operator = "is_true" }
] }

[[canvases.nodes]]
id = "base"
name = "One Suitcase"
blocks = [
  { type = "paragraph", content = "The room is small. Single bed, desk for homework, closet that won't fit much. The window faces the backyard — she can see the creek from here." },
  { type = "image", props = { file = "story/story_unpacking.jpg", search_queries = ["young woman small bedroom suitcase bed unpacking evening", "woman unpacking suitcase bedroom single bed lamp"] } },
  { type = "paragraph", content = "She sets the suitcase on the bed. Unzips it. Everything she owns for the next two months." },
  { type = "paragraph", content = "Hoodie. Jeans. The good sundress — why did she pack that? Three t-shirts. Shorts. Sleep clothes. Underwear she shoves into the drawer without looking." },
  { type = "paragraph", content = "Through the wall: the scratch of pencil on paper. @jake's room. She can hear him drawing." },
  { type = "paragraph", content = "Down the hall: the TV, low volume. @ryan watching something." },
  { type = "paragraph", content = "Downstairs: dishes. @frank cleaning up alone." },
  { type = "paragraph", content = "*The mattress smells like someone else's laundry detergent. The pillow is too soft. The walls are too thin.*" },
  { type = "paragraph", content = "*Home for fifty-six days.*" }
]
exit_block = { type = "location", text = "Close the suitcase.", config = { destinationType = "trigger", time_progression_minutes = 30, flagEffects = [{ targetType = "player", flag = "unpacked" }] } }

# ─── BEAT 2: FIRST MORNING ───

[[canvases]]
id = "story_first_morning"
name = "The Bathroom Door"
description = "Morning. Shared bathroom. The lock doesn't work. Jake is already inside."

[canvases.trigger]
location = "loc_bathroom"
npc = "npc_jake"
is_repeatable = false
priority = 10
is_active = true
conditions = { version = "1.0", logic = "AND", items = [
  { type = "flag", subject = "player", flag_key = "game_started", operator = "is_true" },
  { type = "days_since_flag", subject = "player", flag_key = "game_started", operator = "gte", value = 1 }
] }

[[canvases.nodes]]
id = "base"
name = "The Door That Doesn't Lock"
blocks = [
  { type = "paragraph", content = "Morning. The bathroom door is shut but not locked — the hook latch doesn't catch. She'd forgotten." },
  { type = "paragraph", content = "She pushes it open." },
  { type = "paragraph", content = "@jake at the sink. T-shirt, boxers. Toothbrush in his mouth. He looks at her in the mirror." },
  { type = "paragraph", content = "Not embarrassed. Not surprised. Annoyed." },
  { type = "image", props = { file = "story/story_first_morning_bathroom_problem.jpg", search_queries = ["young man bathroom sink morning annoyed mirror"] } },
  { type = "dialog", content = "Knock.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "One word. He doesn't look away from the mirror. Doesn't stammer. Doesn't blush. Goes back to brushing his teeth like she's already gone." },
  { type = "paragraph", content = "*Not 'sorry.' Not 'the lock doesn't work.' Just 'knock.' Like I'm intruding on his house. His bathroom. His morning.*" },
  { type = "paragraph", content = "*The walls are thin. The lock doesn't work. One bathroom for four people. And one of them doesn't want me here.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Sorry.\" Back out. Close the door.", targetType = "trigger", time_progression_minutes = 15, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "trust", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "first_morning" }] }, { text = "Say nothing. Close the door.", targetType = "trigger", time_progression_minutes = 15, effects = [ { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "first_morning" }] } ] }

# ─── BEAT 3: BUS PROBLEM ───

[[canvases]]
id = "story_bus_problem"
name = "The Bus or the Truck"
description = "Getting to town costs money or independence. Ryan offers a ride."

[canvases.trigger]
location = "loc_hallway"
npc = "npc_ryan"
is_repeatable = false
priority = 10
is_active = true
conditions = { version = "1.0", logic = "AND", items = [
  { type = "flag", subject = "player", flag_key = "first_morning", operator = "is_true" },
  { type = "days_since_flag", subject = "player", flag_key = "first_morning", operator = "gte", value = 1 }
] }

[[canvases.nodes]]
id = "base"
name = "The Offer"
blocks = [
  { type = "paragraph", content = "She needs to get to campus. The bus stop is a fifteen-minute walk down the road. Forty minutes each way, two dollars per ride." },
  { type = "paragraph", content = "@ryan is in the hallway. Keys in hand. Truck keys — she can hear the engine ticking from the driveway." },
  { type = "dialog", content = "I can drive you. Fifteen minutes. Free.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He says it casually. Like it's nothing." },
  { type = "paragraph", content = "*Free? Or does 'free' mean he decides when I leave and when I come back?*" },
  { type = "image", props = { file = "story/story_bus_problem_the_ride.jpg", search_queries = ["pickup truck driveway rural morning young man offering ride"] } }
]
exit_block = { type = "choices", choices = [ { text = "\"I'll take the bus. Thanks though.\"", targetType = "trigger", time_progression_minutes = 90, effects = [ { targetType = "player", trait = "money", op = "add", value = -2, clamp = false }, { targetType = "player", trait = "confidence", op = "add", value = 2 } ], flagEffects = [ { targetType = "player", flag = "bus_problem_discovered" }, { targetType = "player", flag = "town_access" } ] }, { text = "\"Sure. Let me grab my bag.\"", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = 1 }, { targetType = "player", trait = "corruption", op = "add", value = 1 } ], flagEffects = [ { targetType = "player", flag = "bus_problem_discovered" }, { targetType = "player", flag = "town_access" } ] } ] }

# ─── BEAT 4: MOM'S CALL ───

[[canvases]]
id = "story_moms_call"
name = "The Transfer's Delayed"
description = "Diana calls. The money isn't coming on time. The guilt is."

[canvases.trigger]
location = "loc_lily_room"
is_repeatable = false
priority = 10
is_active = true
conditions = { version = "1.0", logic = "AND", items = [
  { type = "flag", subject = "player", flag_key = "town_access", operator = "is_true" }
] }

[[canvases.nodes]]
id = "base"
name = "Mom's Voice"
blocks = [
  { type = "paragraph", content = "Her phone buzzes. Mom." },
  { type = "image", props = { file = "story/story_moms_call.jpg", search_queries = ["woman phone bed worried evening", "young woman phone call bedroom concerned"] } },
  { type = "paragraph", content = "Diana's voice is tired. The connection crackles — Dubai to rural Virginia. She called at 3 AM her time." },
  { type = "dialog", content = "Honey, the transfer's going to be a few days late. The exchange rate is complicated. I'm sorry.", props = { speaker = "npc", npcId = "npc_diana" } },
  { type = "dialog", content = "I wouldn't have asked you to stay if there was any other option. You know that, right?", props = { speaker = "npc", npcId = "npc_diana" } },
  { type = "paragraph", content = "*I know, Mom. I know.*" },
  { type = "paragraph", content = "She stares at the phone after hanging up. The bank app shows $398. The list of expenses she wrote on the back of a receipt is getting longer." }
]
exit_block = { type = "choices", choices = [ { text = "\"It's fine, Mom. I'm fine.\"", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "mom_called" }] }, { text = "Tell her the truth about the money situation.", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "player", trait = "money", op = "add", value = 100, clamp = false } ], flagEffects = [{ targetType = "player", flag = "mom_called" }] } ] }

# ─── BEAT 5: THE MATH ───

[[canvases]]
id = "story_the_math"
name = "Thirteen Dollars"
description = "Lily does the numbers. The math is impossible. Frank offers work."

[canvases.trigger]
location = "loc_lily_room"
is_repeatable = false
priority = 10
is_active = true
conditions = { version = "1.0", logic = "AND", items = [
  { type = "flag", subject = "player", flag_key = "mom_called", operator = "is_true" },
  { type = "days_since_flag", subject = "player", flag_key = "mom_called", operator = "gte", value = 1 }
] }

[[canvases.nodes]]
id = "base"
name = "The Numbers"
blocks = [
  { type = "paragraph", content = "She sits on the bed with her phone calculator and the back of a receipt." },
  { type = "paragraph", content = "Bus pass: $80 a month. Art supplies: $60. Phone bill: $45. Food contribution — @frank mentioned it at dinner, casual, like it was obvious — $50 a week." },
  { type = "paragraph", content = "That's $385 a month. She has $400." },
  { type = "paragraph", content = "*Thirteen dollars. For ten weeks.*" },
  { type = "paragraph", content = "Mom's $200 transfer — when it comes — covers half a month. Maybe. If the exchange rate cooperates. If Diana remembers." },
  { type = "paragraph", content = "*I'm not calling her. I'm not asking @frank. I'm not asking anyone.*" },
  { type = "image", props = { file = "story/story_the_math_morning_realization.jpg", search_queries = ["young woman bedroom phone calculator worried receipts money"] } }
]
exit_block = { type = "choices", choices = [ { text = "Go find Frank. Ask about work.", targetType = "node", nodeId = "story_the_math.frank_offer" } ] }

[[canvases.nodes]]
id = "frank_offer"
name = "Frank's Offer"
blocks = [
  { type = "paragraph", content = "She finds him in the kitchen. He's reading the paper. Coffee black, half finished." },
  { type = "dialog", content = "The house could use regular cleaning. Twenty dollars per session. I'll show you what needs doing.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "He says it like he's been waiting for her to ask. Maybe he has." },
  { type = "dialog", content = "And the food money — fifty a week. That's non-negotiable. Everyone pulls their weight.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "His tone isn't unkind. It's practical. The same tone he uses for everything — delivering information, not opinions." }
]
exit_block = { type = "choices", choices = [ { text = "\"Deal. When do I start?\"", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 2 }, { targetType = "player", trait = "money", op = "add", value = 20, clamp = false } ], flagEffects = [ { targetType = "player", flag = "money_crisis_realized" }, { targetType = "player", flag = "chores_started" } ] }, { text = "\"That's generous. Thank you, Frank.\"", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 1 }, { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 2 }, { targetType = "player", trait = "money", op = "add", value = 20, clamp = false } ], flagEffects = [ { targetType = "player", flag = "money_crisis_realized" }, { targetType = "player", flag = "chores_started" } ] } ] }

