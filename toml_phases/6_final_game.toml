[[canvases.nodes]]
id = "convince"
name = "Stay"
blocks = [
  { type = "paragraph", content = "She runs. Bare feet on cold ground. The gravel bites but she doesn't stop." },
  { type = "paragraph", content = "She opens the passenger door. Gets in. He looks at her. The engine is running. The bag is packed. His hand is on the gearshift." },
  { type = "paragraph", content = "She puts her hand on his. Moves it off the gearshift. To the bench seat between them. Then lower." },
  { type = "dialog", content = "Stay.", props = { speaker = "player" } },
  { type = "paragraph", content = "Her hand moves. He closes his eyes. The performance is gone — the grin, the cocky set of his jaw, the testing. Just a man in a truck with his eyes closed and his breath catching." },
  { type = "dialog", content = "We'll figure it out. You and me. Your own jobs. I'll do the numbers, find the clients. You're better than your dad's leftovers.", props = { speaker = "player" } },
  { type = "paragraph", content = "He makes a sound. Not the Ryan sound. The real one underneath — the one from the lookout point, from the scar story, from every moment the act drops and there's just a boy who wanted to be more than his father's shadow." },
  { type = "paragraph", content = "His hand finds hers. Grips it. The engine is still running." },
  { type = "paragraph", content = "He turns it off." },
  { type = "paragraph", content = "The driveway is quiet. The truck stays." }
]
