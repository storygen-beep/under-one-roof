[[canvases.nodes]]
id = "possessive"
name = "Watching"
blocks = [
  { type = "paragraph", content = "He flinches. The shame hits first — red face, eyes down, hands reaching for the drawings like he can take them back." },
  { type = "paragraph", content = "Then something else. His jaw sets. He meets her eyes." },
  { type = "dialog", content = "I can't stop.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "Not an apology. A confession. The shy boy has teeth." },
  { type = "dialog", content = "I draw you when you're not looking because that's when you're real. When you're posing you're... performing. When you're sleeping you're just you.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "*The sweet one. The harmless one. He's been drawing me in my sleep. And he's not sorry.*" },
  { type = "paragraph", content = "*I should be angry. I'm not angry. I'm something else.*" }
]
exit_block = { type = "location", text = "Leave his room. Don't say anything else.", config = { destinationType = "trigger", time_progression_minutes = 30 } }

