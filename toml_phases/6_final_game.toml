# ─── PROPERTY CONTAINER ───

[[locations]]
id = "loc_property"
name = "The Harmon Property"
description = "A contractor's rural spread — main house, detached workshop, a yard that blurs into fields and trees. The gravel driveway crunches under every arrival and departure. The nearest neighbor is a ten-minute walk. At night, the property is so quiet you can hear the creek and every footstep in the hallway."
image = "locations/property.jpg"
image_search_queries = ["rural American contractor property house workshop gravel driveway isolated dusk"]
is_container = true
default_entry = "loc_hallway"
entry_from = "loc_town"
navigation_order = []

[[locations]]
id = "loc_hallway"
name = "Hallway"
description = "Narrow, uneven hardwood floors that creak with every step. @frank's boots by the front door. A coat rack holding three sizes of flannel. The bathroom door at the end — no lock that works properly. Lily's room is second on the right. @jake's room is right next to it. At 2 AM, every footstep is an announcement."
image = "locations/hallway.jpg"
image_search_queries = ["narrow farmhouse hallway hardwood floors coat rack boots dim night"]
parent = "loc_property"
navigation_order = ["loc_kitchen", "loc_living_room", "loc_bathroom", "loc_franks_office", "loc_lily_room", "loc_jakes_room", "loc_workshop", "loc_backyard"]
clothing_rules = [
  { slots_required = ["bra", "underwear", "top", "bottom"], message = "Lily needs to get dressed before leaving her room." }
]

[[locations]]
id = "loc_kitchen"
name = "Kitchen"
description = "The social hub. Butcher-block counters stained by decades of meals. A table that seats four but has five chairs — @frank added one when Lily arrived. The coffee maker starts at 5 AM. The window above the sink faces the backyard. At dinner, all three men are here. At 2 AM, it's just @frank with a whiskey and the refrigerator light."
image = "locations/kitchen.jpg"
image_search_queries = ["farmhouse kitchen butcher block counters wooden table warm lighting"]
entry_from = "loc_hallway"
clothing_rules = [
  { slots_required = ["bra", "underwear", "top", "bottom"], message = "Lily can't walk into the kitchen like this." }
]

[[locations]]
id = "loc_living_room"
name = "Living Room"
description = "Worn leather couch that fits three if nobody cares about personal space. A TV on a stand older than @ryan. Bookshelves with more tools than books. A window seat where Lily reads when the couch is occupied. At night, the TV fills the room with blue light and whoever's watching sits in the glow."
image = "locations/living_room.jpg"
image_search_queries = ["farmhouse living room worn leather couch old TV bookshelves blue glow night"]
entry_from = "loc_hallway"
clothing_rules = [
  { slots_required = ["bra", "underwear", "top", "bottom"], message = "Lily can't sit on the couch like this." }
]

[[locations]]
id = "loc_bathroom"
name = "Shared Bathroom"
description = "One bathroom for four people. The door lock is a hook-latch that doesn't always catch. Steam lingers for twenty minutes after a shower. @ryan's towel is always on the floor. @frank's razor is by the sink. The mirror is directly across from the door — whoever walks in sees everything reflected."
image = "locations/bathroom.jpg"
image_search_queries = ["small farmhouse bathroom single shower mirror facing door towels steam"]
entry_from = "loc_hallway"

[[locations]]
id = "loc_franks_office"
name = "Frank's Office"
description = "The only room in the house with a lock that works. A heavy desk covered in invoices, a filing cabinet, a desk lamp that casts the room in amber. Smells like leather and old paper. The chair behind the desk is @frank's throne. The chair in front is where Lily sits for bookkeeping. When the door closes, the rest of the house disappears."
image = "locations/franks_office.jpg"
image_search_queries = ["contractor home office heavy desk invoices desk lamp amber leather chair"]
entry_from = "loc_hallway"
clothing_rules = [
  { slots_required = ["bra", "underwear", "top", "bottom"], message = "Lily can't walk into Frank's office like this." }
]

[[locations]]
id = "loc_lily_room"
name = "Lily's Room"
description = "A single bed, a desk for homework, a closet too small for the wardrobe she's accumulating. The window faces the backyard — she can see the creek from here. The wall to her left is shared with @jake's room. At night, sound carries: pencil scratching paper, music through earbuds, the creak of a bedframe."
image = "locations/lily_room.jpg"
image_search_queries = ["simple bedroom single bed desk small closet window warm lamp young woman"]
entry_from = "loc_hallway"

[[locations]]
id = "loc_jakes_room"
name = "Jake's Room"
description = "Art everywhere. Sketches pinned to the walls — landscapes, hands, the creek at different times of day. A desk buried under charcoal sticks and eraser shavings. The light is good in the afternoon — curtains open for natural light. The wall to his right is shared with Lily's room. His door is often cracked open."
image = "locations/jakes_room.jpg"
image_search_queries = ["young artist bedroom sketches pinned walls messy desk charcoal natural light"]
entry_from = "loc_hallway"

[[locations]]
id = "loc_workshop"
name = "Workshop"
description = "Detached from the main house, connected by a gravel path. Table saw, hand tools on pegboard, sawhorses, the smell of cut wood and motor oil. @ryan's weights are in the corner — a bench press and dumbbells. This is where @frank starts his day at 5 AM and where the business runs."
image = "locations/workshop.jpg"
image_search_queries = ["detached workshop garage table saw pegboard tools weight bench sawdust"]
entry_from = "loc_hallway"
clothing_rules = [
  { slots_required = ["bra", "underwear", "top", "bottom"], message = "Lily can't go to the workshop like this." }
]

# ─── BACKYARD CONTAINER ───

[[locations]]
id = "loc_backyard"
name = "Backyard"
description = "Behind the house, the mowed grass gives way to wild growth within twenty feet. A clothesline between two posts. Beyond the yard, the property slopes down to the creek — a fifteen-minute walk through trees. From the kitchen window, you can see anyone who's out here."
image = "locations/backyard.jpg"
image_search_queries = ["rural farmhouse backyard clothesline overgrown garden tree line field"]
is_container = true
default_entry = "loc_yard"
entry_from = "loc_hallway"
navigation_order = ["loc_creek"]

[[locations]]
id = "loc_yard"
name = "Yard"
description = "The cleared area behind the house. Flat enough to jog loops. A clothesline running east-west. A bench by the garden where @frank sits on Sunday mornings. Sunbathing here means being visible from the kitchen window, @jake's window, and the workshop."
image = "locations/yard.jpg"
image_search_queries = ["farmhouse yard flat grass clothesline wooden bench visible from house"]
parent = "loc_backyard"

[[locations]]
id = "loc_creek"
name = "Creek"
description = "Fifteen minutes through trees from the house. Shallow enough to wade, deep enough at the bend to swim. Smooth rocks, overhanging branches, dappled light. Far enough that voices don't carry, close enough that anyone could walk down."
image = "locations/creek.jpg"
image_search_queries = ["rural creek swimming hole shallow water rocks overhanging trees dappled sunlight"]
entry_from = "loc_backyard"

# ─── MOBILE LOCATION ───

[[locations]]
id = "loc_ryans_truck"
name = "Ryan's Truck"
description = "A dented pickup that runs louder than it should. The cab smells like pine air freshener and whatever @ryan wore to the job site. Bench seat — no center console. The radio plays classic rock too loud. He drives with one hand on the wheel and the other on the gear shift, uncomfortably close to her knee."
image = "locations/ryans_truck.jpg"
image_search_queries = ["old pickup truck interior bench seat pine air freshener rural road"]
entry_from = "loc_town"

# ─── TOWN LOCATIONS ───

[[locations]]
id = "loc_town"
name = "Town"
description = "Forty minutes by bus, fifteen in @ryan's truck. A small college town with a main street, a campus, and not much else. If Lily takes the bus, nobody knows she was here. If @ryan drives, he knows everything. The price of independence is always $2."
image = "locations/town.jpg"
image_search_queries = ["small American college town main street shops campus afternoon"]
navigation_order = ["loc_property", "loc_campus", "loc_clothing_store", "loc_general_store", "loc_gym", "loc_park", "loc_diner", "loc_trail_head", "loc_ryans_truck"]

[[locations]]
id = "loc_campus"
name = "Campus"
description = "A small state college — brick buildings, a quad with dying grass. Lily's art building has north-facing windows for natural light. Campus is the one place that has nothing to do with the Harmon household. @jake takes his community college art class two buildings over."
image = "locations/campus.jpg"
image_search_queries = ["small state college campus brick buildings grassy quad art building"]
is_container = true
default_entry = "loc_library"
entry_from = "loc_town"
navigation_order = []

[[locations]]
id = "loc_library"
name = "Library"
description = "Basement of the humanities building. Low ceilings, fluorescent lights, the smell of old paper. Study carrels along the walls, group tables in the middle. @jake comes here on afternoons when his class lets out early. The carrels are semi-private — close enough to whisper, close enough to touch under the divider."
image = "locations/library.jpg"
image_search_queries = ["college library basement low ceilings study carrels fluorescent lights"]
parent = "loc_campus"

[[locations]]
id = "loc_clothing_store"
name = "Clothing Store"
description = "A boutique on main street — farm-practical to surprisingly fashionable. The owner doesn't judge what you buy but remembers everything. Two dressing rooms with curtains that don't fully close. If @ryan drove, he's outside watching the bags."
image = "locations/clothing_store.jpg"
image_search_queries = ["small town women clothing boutique racks dressing rooms main street"]
entry_from = "loc_town"

[[locations]]
id = "loc_general_store"
name = "General Store"
description = "Narrow aisles, everything from groceries to art supplies to phone cards. The cashier knows every face in the county. Art supplies in the back — Lily's monthly expense she can't skip."
image = "locations/general_store.jpg"
image_search_queries = ["small town general store narrow aisles mixed goods local cashier"]
entry_from = "loc_town"

[[locations]]
id = "loc_gym"
name = "Gym"
description = "Old equipment that works fine. Free weights, treadmills, a bench press that @ryan treats like a personal altar. A shared hallway between locker rooms. Bodies are unavoidable. Sweat is unavoidable."
image = "locations/gym.jpg"
image_search_queries = ["small town public gym free weights treadmill bench press fluorescent"]
entry_from = "loc_town"

[[locations]]
id = "loc_park"
name = "Park"
description = "Jogging trail, benches, a pond with ducks nobody feeds. @jake comes here on weekends to sketch the water. Neutral territory — not the property, not @ryan's turf, not @frank's domain."
image = "locations/park.jpg"
image_search_queries = ["small town park jogging trail benches pond trees peaceful afternoon"]
entry_from = "loc_town"

[[locations]]
id = "loc_diner"
name = "Diner"
description = "Vinyl booths, laminate tables, coffee that's been sitting too long. A bell on the door. The owner is always hiring because the pay is bad. $45 a shift if she's willing to skip dinner at home."
image = "locations/diner.jpg"
image_search_queries = ["small town American diner vinyl booths coffee pot evening lighting"]
entry_from = "loc_town"

# ─── HIKING TRAIL LOCATIONS ───

[[locations]]
id = "loc_trail_head"
name = "Trail Head"
description = "A dirt pulloff where @ryan parks the truck. A wooden sign with a faded trail map. Three miles through mixed forest. The group dynamic at the trailhead sets the tone: who walks with whom, who falls behind with Lily."
image = "locations/trail_head.jpg"
image_search_queries = ["hiking trail head dirt pulloff wooden sign forest entrance weekend"]
is_container = true
default_entry = "loc_rest_stop"
entry_from = "loc_town"
navigation_order = ["loc_isolated_creek"]

[[locations]]
id = "loc_rest_stop"
name = "Rest Stop"
description = "A flat area with a picnic table and a valley view. The table fits four. Seating arrangement matters — across from someone is safe, next to someone is proximity. Things said at altitude feel more real."
image = "locations/rest_stop.jpg"
image_search_queries = ["hiking trail rest stop picnic table valley view forest clearing"]
parent = "loc_trail_head"

[[locations]]
id = "loc_isolated_creek"
name = "Isolated Creek"
description = "A swimming spot deeper in the trail, off the main path. Cold water, bigger rocks, more privacy than the property creek. Far enough that voices don't carry. Close enough that someone could walk up unannounced."
image = "locations/isolated_creek.jpg"
image_search_queries = ["secluded forest creek swimming hole deeper water mossy rocks private"]
entry_from = "loc_trail_head"

