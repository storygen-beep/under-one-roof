[[canvases.nodes]]
id = "base"
name = "All of It"
blocks = [
  { type = "paragraph", content = "She walks into his room. The drawings are laid out on the bed. All of them. In order." },
  { type = "paragraph", content = "Her hands — the first one. The chip in her thumbnail, the freckle below her ear. Then her face. Her jawline in afternoon light. Then full figure by the window. Then the strap, lowered, collarbone exposed. Then bare. All of her, in charcoal, from the first sketch to the last." },
  { type = "paragraph", content = "A complete series. She's never seen them together like this. Each one is a step — a step of trust, a step of skin, a step closer." },
  { type = "image", props = { file = "story/story_first_flirtation_jake_charged_pose.jpg", search_queries = ["charcoal drawings series portrait woman progression intimate art bedroom"] } },
  { type = "paragraph", content = "@jake is standing by the window. Nervous. He laid them out on purpose. Wanted her to see them together." },
  { type = "dialog", content = "It's you. All of it. I wanted you to see what I see.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "She looks at the drawings. Then at him. The boy who couldn't finish a sentence when she arrived just showed her every version of herself he's been carrying in his head." },
