  ] } },
  { type = "paragraph", content = "Something has to give. Something already has." }
]
exit_block = { type = "choices", choices = [ { text = "Pick up extra diner shifts. Work harder.", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "player", trait = "confidence", op = "add", value = 2 } ], flagEffects = [{ targetType = "player", flag = "financial_crisis" }] }, { text = "Call Mom. Ask her to try again.", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "player", trait = "money", op = "add", value = 100, clamp = false } ], flagEffects = [ { targetType = "player", flag = "financial_crisis" }, { targetType = "player", flag = "mom_suspicious" } ] }, { text = "Wait. Something will come up. It has to.", targetType = "trigger", time_progression_minutes = 30, flagEffects = [{ targetType = "player", flag = "financial_crisis" }] } ] }

