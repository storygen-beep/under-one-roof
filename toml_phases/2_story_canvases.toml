  { type = "paragraph", content = "She doesn't move. His hand stays on her knee. His thumb traces a small circle on her kneecap." },
  { type = "paragraph", content = "The grin sharpens. He knows what her not-moving means." },
  { type = "dialog", content = "That's what I thought.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He drives slower for the last mile. His hand doesn't move. Neither does she." },
  { type = "paragraph", content = "*I should have moved his hand. I didn't want to move his hand.*" }
]
