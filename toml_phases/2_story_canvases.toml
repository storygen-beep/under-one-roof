name = "Then Don't Draw"
blocks = [
  { type = "paragraph", content = "She reaches for his hand. The one that was holding the pencil. Charcoal-stained fingers, shaking. She pulls it from the desk to her knee." },
  { type = "paragraph", content = "His fingers — warm, rough from graphite — on her skin. First time he's touched the subject instead of drawing it." },
  { type = "paragraph", content = "He crosses the room. His glasses bump her forehead — he pulls back, embarrassed — and she closes the gap." },
  { type = "paragraph", content = "His mouth is soft. He tastes like graphite and the coffee he drinks too sweet. His hand finds her jaw. Holds it like he's positioning a portrait. But this isn't a portrait. This is her mouth and his mouth and the sketchbook sliding off the bed and neither of them reaching for it." },
  { type = "paragraph", content = "*He drew me a hundred times. Hands, face, body, bare. Every line was practice for touching me. And now his hand is on my jaw and the pencil is on the floor and the drawing can't hold him anymore.*" }
]
exit_block = { type = "choices", choices = [ { text = "Pull him closer.", targetType = "trigger", time_progression_minutes = 120, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = 5 }, { targetType = "npc", npcId = "npc_jake", trait = "corruption", op = "add", value = 4 }, { targetType = "player", trait = "corruption", op = "add", value = 5 } ], flagEffects = [ { targetType = "player", flag = "jake_pencil_dropped" }, { targetType = "player", flag = "kiss_unlock" }, { targetType = "player", flag = "jake_kiss" } ] } ] }

[[canvases.nodes]]
id = "trace"
name = "Keep Drawing"
blocks = [
  { type = "paragraph", content = "She stays still. He picks up the pencil." },
  { type = "paragraph", content = "But his hand doesn't go to the paper." },
  { type = "paragraph", content = "It goes to her hip. The charcoal tip traces the line he was drawing — on her skin instead of paper. Collarbone. Ribcage. The curve of her waist. He's drawing ON her." },
  { type = "paragraph", content = "The charcoal is cool on her skin. His breathing changes. Hers changes. The line he draws follows the same path his eyes have been tracing for weeks — but now the paper is her body and the distance is zero." },
  { type = "dialog", content = "Hold still.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "But his voice is different now. Not the artist's instruction. Something lower. Something that makes her stomach pull." },
  { type = "paragraph", content = "*He's drawing on me. The art and the body are the same thing now. His hand on my skin and the charcoal leaving lines and I can feel every one like a sentence he can't say out loud.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Don't stop.\"", targetType = "trigger", time_progression_minutes = 120, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = 4 }, { targetType = "npc", npcId = "npc_jake", trait = "corruption", op = "add", value = 3 }, { targetType = "player", trait = "corruption", op = "add", value = 4 } ], flagEffects = [{ targetType = "player", flag = "jake_pencil_dropped" }] } ] }

