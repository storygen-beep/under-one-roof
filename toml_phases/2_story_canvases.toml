  { type = "paragraph", content = "She needs to get to campus. The bus stop is a fifteen-minute walk down the road. Forty minutes each way, two dollars per ride." },
  { type = "paragraph", content = "@ryan is in the hallway. Keys in hand. Truck keys — she can hear the engine ticking from the driveway." },
  { type = "dialog", content = "I can drive you. Fifteen minutes. Free.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He says it casually. Like it's nothing." },
  { type = "paragraph", content = "*Free? Or does 'free' mean he decides when I leave and when I come back?*" },
  { type = "image", props = { file = "story/story_bus_problem_the_ride.jpg", search_queries = ["pickup truck driveway rural morning young man offering ride"] } }
]
exit_block = { type = "choices", choices = [ { text = "\"I'll take the bus. Thanks though.\"", targetType = "trigger", time_progression_minutes = 90, effects = [ { targetType = "player", trait = "money", op = "add", value = -2, clamp = false }, { targetType = "player", trait = "confidence", op = "add", value = 2 } ], flagEffects = [ { targetType = "player", flag = "bus_problem_discovered" }, { targetType = "player", flag = "town_access" } ] }, { text = "\"Sure. Let me grab my bag.\"", targetType = "trigger", time_progression_minutes = 30, effects = [ { targetType = "npc", npcId = "npc_ryan", trait = "love", op = "add", value = 1 }, { targetType = "player", trait = "corruption", op = "add", value = 1 } ], flagEffects = [ { targetType = "player", flag = "bus_problem_discovered" }, { targetType = "player", flag = "town_access" } ] } ] }

