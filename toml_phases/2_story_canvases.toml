[[canvases.nodes]]
id = "base"
name = "Breakfast"
blocks = [
  { type = "paragraph", content = "Morning. She comes downstairs. Hair done — not elaborate, just cared for. The yoga shows in her posture. The gym in her shoulders. The grooming in the way light catches her skin." },
  { type = "paragraph", content = "@jake is at the table. Sketchbook propped against the salt shaker. Pencil moving. Earbuds in. The usual." },
  { type = "paragraph", content = "He looks up." },
  { type = "paragraph", content = "The pencil stops." },
  { type = "paragraph", content = "He's never looked at her like that. Two weeks of earbuds and closed doors and 'knock' — and now his hand is still and his eyes are tracking the line of her jaw. The curve of her collarbone. The way the morning light hits the side of her neck." },
  { type = "paragraph", content = "He looks back down. Fast. The next line he draws curves wrong — her jawline, not whatever he was sketching. He tears the page out. Crumples it. Shoves it in his pocket." },
  { type = "paragraph", content = "*He drew my jaw. Without meaning to. I saw it before he crumpled it.*" },
  { type = "paragraph", content = "*Two weeks of nothing. And now his pencil can't draw a straight line when I walk in.*" }
]
exit_block = { type = "choices", choices = [ { text = "Eat breakfast. Pretend she didn't notice.", targetType = "node", nodeId = "story_jake_notices.hallway" } ] }

[[canvases.nodes]]
id = "hallway"
name = "The Invitation"
blocks = [
  { type = "paragraph", content = "Afternoon. He's walking past her in the hallway. Sketchbook under his arm. He stops." },
  { type = "paragraph", content = "He doesn't look at her. Looks at the floor. At the wall. At his sketchbook." },
  { type = "dialog", content = "I could draw you. This afternoon. If you're not busy.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "He says it to the floor. Already walking away before she answers. His ears are red — the first color she's seen on him since the bathroom." },
  { type = "paragraph", content = "*Three weeks of nothing. Earbuds and closed doors and one-word answers. And now this.*" },
  { type = "paragraph", content = "*'If you're not busy.' Like he's been rehearsing it. Like he's been wanting to ask since the crumpled page at breakfast and couldn't find the words until now.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"I'd like that.\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "love", op = "add", value = 2 }, { targetType = "npc", npcId = "npc_jake", trait = "trust", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "drawing_started" }] }, { text = "\"What changed your mind?\"", targetType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "trust", op = "add", value = 2 }, { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "drawing_started" }] } ] }

