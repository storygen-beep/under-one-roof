name = "The Numbers"
blocks = [
  { type = "paragraph", content = "She passes his office during cleaning. The door is open — unusual. He's at the desk, papers fanned out, pinching the bridge of his nose." },
  { type = "dialog", content = "Lily. You good with numbers?", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "He gestures at the invoices. Client payments, supply costs, payroll for the crew. The filing cabinet behind him is overflowing." },
  { type = "dialog", content = "Twenty-five dollars per session. Three times a week. You handle the receivables, I handle the rest.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "The office smells like leather and old paper. The desk lamp casts everything in amber. There are two chairs — his behind the desk, and one in front." },
  { type = "image", props = { file = "story/story_bookkeeping_offer_the_offer.jpg", search_queries = ["home office desk invoices amber lamp older man younger woman professional"] } },
  { type = "paragraph", content = "*Twenty-five dollars. Three times a week. That's seventy-five a week. That changes everything.*" },
  { type = "paragraph", content = "*Behind a door that locks.*" }
]
