  { type = "dialog", content = "I know you're struggling with money.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "Not a question. He's been doing the books. He knows exactly how much she has." },
  { type = "group", blocks = [
    { type = "dialog", content = "I know you can't afford this. Neither can I.", props = { speaker = "npc", npcId = "npc_frank" } },
    { type = "paragraph", content = "He turns from the window. His face is honest in a way she's never seen. Two people drowning, offering each other rope." }
  ], conditions = { version = "1.0", items = [
    { type = "flag", subject = "player", flag_key = "chose_confront_frank", operator = "is_true" }
  ] } },
  { type = "group", blocks = [
    { type = "dialog", content = "I'll cover everything. Bus pass. Art supplies. Phone. Food.", props = { speaker = "npc", npcId = "npc_frank" } },
    { type = "paragraph", content = "He turns from the window. His face is controlled. This is a transaction he's rehearsed." }
  ], conditions = { version = "1.0", items = [
    { type = "flag", subject = "player", flag_key = "chose_confront_frank", operator = "is_false" }
  ] } },
  { type = "image", props = { file = "story/story_franks_offer_the_office.jpg", search_queries = ["older man office window evening serious proposal younger woman"] } },
  { type = "dialog", content = "In exchange, you stay. Late nights. The office. Whatever I need help with.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "\"Help with.\" They both know what that means. The words are doing a job the truth won't do." },
  { type = "paragraph", content = "*He's offering to save me. The price is him. Or maybe the price is me.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Deal.\"", targetType = "node", nodeId = "story_franks_arrangement.accepted", effects = [ { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 3 }, { targetType = "npc", npcId = "npc_frank", trait = "corruption", op = "add", value = 5 }, { targetType = "player", trait = "corruption", op = "add", value = 5 }, { targetType = "player", trait = "money", op = "add", value = 150, clamp = false } ], flagEffects = [{ targetType = "player", flag = "frank_offer" }] }, { text = "\"I don't need your money.\"", targetType = "node", nodeId = "story_franks_arrangement.refused", effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 3 }, { targetType = "player", trait = "confidence", op = "add", value = 5 } ], flagEffects = [{ targetType = "player", flag = "frank_offer" }] }, { text = "\"I'll help with the business. As a partner, not a favor.\"", targetType = "node", nodeId = "story_franks_arrangement.negotiated", effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 4 }, { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 2 }, { targetType = "player", trait = "intelligence", op = "add", value = 2 } ], flagEffects = [{ targetType = "player", flag = "frank_offer" }] } ] }

[[canvases.nodes]]
id = "accepted"
name = "The Deal"
blocks = [
  { type = "paragraph", content = "One word. She watches it land on him." },
  { type = "paragraph", content = "Relief. Hunger. Guilt. All three cross his face in two seconds." },
  { type = "dialog", content = "Starting tonight.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "He sits behind the desk. His chair. Her chair. The positions set." },
  { type = "paragraph", content = "*I sold something. I'm not sure what yet. But the math works now. The math finally works.*" }
]
exit_block = { type = "location", text = "Stay.", config = { destinationType = "trigger", time_progression_minutes = 120 } }

[[canvases.nodes]]
id = "refused"
name = "The Refusal"
blocks = [
  { type = "paragraph", content = "His eyebrows lift. Genuine surprise. He wasn't expecting no." },
  { type = "dialog", content = "You can barely afford—", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "dialog", content = "I'll figure it out. I always do.", props = { speaker = "player" } },
  { type = "paragraph", content = "He looks at her. Really looks. Not at the girl who cleans his house or does his books. At a person who just chose difficulty over comfort." },
  { type = "dialog", content = "...Alright.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "The ellipsis is audible. Something shifted. He sees her differently now — not a transaction, not a responsibility. A person." },
  { type = "paragraph", content = "*The money's still impossible. But I'm still mine.*" }
]
exit_block = { type = "location", text = "Leave the office.", config = { destinationType = "trigger", time_progression_minutes = 30 } }

[[canvases.nodes]]
id = "negotiated"
name = "The Partnership"
blocks = [
  { type = "paragraph", content = "He blinks. That wasn't one of the options he'd prepared for." },
  { type = "dialog", content = "A partner.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "dialog", content = "I'm good with numbers. You said so yourself. Let me help with the real books. Not the cleaned-up version — the real ones. I'll earn my keep, but as a partner, not a...", props = { speaker = "player" } },
  { type = "paragraph", content = "She doesn't finish. They both know what she didn't say." },
  { type = "paragraph", content = "@frank sits down. Leans back. Studies her with those steady dark eyes." },
  { type = "dialog", content = "Fifty a session instead of twenty-five. I'll cover the bus pass. The rest you earn.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "He extends his hand across the desk. A handshake. Like the first day — but this time, neither of them lets go quickly enough." },
  { type = "paragraph", content = "*Business partners. In a room with a locked door. At night. Sure, Frank. Business partners.*" }
]
exit_block = { type = "location", text = "Shake his hand.", config = { destinationType = "trigger", time_progression_minutes = 60 } }

