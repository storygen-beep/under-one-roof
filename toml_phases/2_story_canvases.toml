[[canvases.nodes]]
id = "base"
name = "The Real Numbers"
blocks = [
  { type = "paragraph", content = "Bookkeeping. The usual — invoices, receivables, payroll. @frank is in the workshop. He left her alone with the books." },
  { type = "paragraph", content = "She opens the wrong drawer. Or maybe the right one." },
  { type = "paragraph", content = "A second ledger. Not the one she works from — the one underneath. Different handwriting. @frank's. The numbers are smaller, tighter, cramped with worry." },
  { type = "paragraph", content = "Outstanding loans. Credit line maxed. Three clients who haven't paid in six months. A mortgage payment circled in red with a question mark." },
  { type = "image", props = { file = "story/story_franks_secret_the_ledger.jpg", search_queries = ["woman discovering financial documents office desk secret ledger worried"] } },
  { type = "paragraph", content = "She does the math. The intelligence she's built — campus classes, bookkeeping practice — makes the picture clear in seconds." },
  { type = "paragraph", content = "The business is $40,000 in debt. @frank has been hiding it. From @ryan, from @jake, from Diana." },
  { type = "paragraph", content = "*He can't afford this house. He can't afford his sons. He can't afford the fifty dollars a week he's charging me for food.*" },
  { type = "paragraph", content = "*He's drowning. And nobody knows but me.*" },
  { type = "paragraph", content = "The workshop door opens. Boots on gravel. He's coming back." }
]
exit_block = { type = "choices", choices = [ { text = "\"I found something in the books, Frank.\"", targetType = "node", nodeId = "story_franks_secret.confront", flagEffects = [ { targetType = "player", flag = "frank_secret_complete" }, { targetType = "player", flag = "chose_confront_frank" } ] }, { text = "Close the drawer. Put the ledger back. Say nothing.", targetType = "node", nodeId = "story_franks_secret.protect", flagEffects = [{ targetType = "player", flag = "frank_secret_complete" }] } ] }

[[canvases.nodes]]
id = "confront"
name = "The Confrontation"
blocks = [
  { type = "paragraph", content = "He stops in the doorway. Sees the ledger open. His face goes white." },
  { type = "paragraph", content = "Then angry. Not at her — at the situation. At being caught. At the look on her face that says she already did the math." },
  { type = "dialog", content = "That's not your concern.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "dialog", content = "Forty thousand dollars isn't my concern?", props = { speaker = "player" } },
  { type = "dialog", content = "I said I'll handle it.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "His jaw is tight. The controlled man, controlled. But cracking." },
  { type = "dialog", content = "You're charging me fifty a week for food money you can't afford to lose. You offered me a job doing books that prove you're broke. And Diana doesn't know.", props = { speaker = "player" } },
  { type = "paragraph", content = "Silence. The clock ticks. He sits down. Not behind the desk — in the other chair. Her chair. Like the power just shifted and even the furniture knows it." },
  { type = "dialog", content = "No. Diana doesn't know.", props = { speaker = "npc", npcId = "npc_frank" } }
]
exit_block = { type = "location", text = "Leave him alone with the numbers.", config = { destinationType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = -3 }, { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 2 }, { targetType = "player", trait = "confidence", op = "add", value = 3 } ] } }

[[canvases.nodes]]
id = "protect"
name = "The Protection"
blocks = [
  { type = "paragraph", content = "She closes the drawer. Slides the ledger back under. Smooths the papers on top." },
  { type = "paragraph", content = "By the time he walks in, she's working on receivables. The correct ledger. The safe numbers." },
  { type = "dialog", content = "Everything in order?", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "dialog", content = "Everything's fine.", props = { speaker = "player" } },
  { type = "paragraph", content = "He looks at her. A beat too long. Something in his eyes — does he know she found it? Does he suspect?" },
  { type = "paragraph", content = "*I carry his secret now. He doesn't even know I have it.*" },
  { type = "paragraph", content = "*Forty thousand dollars of silence between us. A bond he didn't ask for and I didn't plan.*" }
]
exit_block = { type = "location", text = "Finish the books.", config = { destinationType = "trigger", time_progression_minutes = 60, effects = [ { targetType = "npc", npcId = "npc_frank", trait = "trust", op = "add", value = 2 }, { targetType = "npc", npcId = "npc_frank", trait = "love", op = "add", value = 2 }, { targetType = "player", trait = "corruption", op = "add", value = 2 } ] } }

