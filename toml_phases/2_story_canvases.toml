blocks = [
  { type = "paragraph", content = "She smacks his hand off her knee. Hard enough that it stings." },
  { type = "paragraph", content = "@ryan pulls back. Both hands on the wheel. The grin flickers — surprise, then something that might be respect." },
  { type = "dialog", content = "Alright. Message received.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "He turns the radio on. Loud. Doesn't say another word until they pull into the driveway." },
  { type = "paragraph", content = "But she notices: he holds the door for her when she gets out. He's never done that before." },
  { type = "paragraph", content = "*He's not angry. He's... recalculating.*" }
]
