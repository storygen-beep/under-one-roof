  { type = "paragraph", content = "She's been teasing this man for weeks. No bra in the kitchen. The short shorts mopping. The skirt on bookkeeping days. Crossing and uncrossing her legs while he tried to read receivables. All deliberate. All to see if the controlled man would crack." },
