[[canvases.nodes]]
id = "base"
name = "The Door That Doesn't Lock"
blocks = [
  { type = "paragraph", content = "Morning. The bathroom door is shut but not locked — the hook latch doesn't catch. She'd forgotten." },
  { type = "paragraph", content = "She pushes it open." },
  { type = "paragraph", content = "@jake at the sink. T-shirt, boxers. Toothbrush in his mouth. He looks at her in the mirror." },
  { type = "paragraph", content = "Not embarrassed. Not surprised. Annoyed." },
  { type = "image", props = { file = "story/story_first_morning_bathroom_problem.jpg", search_queries = ["young man bathroom sink morning annoyed mirror"] } },
  { type = "dialog", content = "Knock.", props = { speaker = "npc", npcId = "npc_jake" } },
  { type = "paragraph", content = "One word. He doesn't look away from the mirror. Doesn't stammer. Doesn't blush. Goes back to brushing his teeth like she's already gone." },
  { type = "paragraph", content = "*Not 'sorry.' Not 'the lock doesn't work.' Just 'knock.' Like I'm intruding on his house. His bathroom. His morning.*" },
  { type = "paragraph", content = "*The walls are thin. The lock doesn't work. One bathroom for four people. And one of them doesn't want me here.*" }
]
exit_block = { type = "choices", choices = [ { text = "\"Sorry.\" Back out. Close the door.", targetType = "trigger", time_progression_minutes = 15, effects = [ { targetType = "npc", npcId = "npc_jake", trait = "trust", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "first_morning" }] }, { text = "Say nothing. Close the door.", targetType = "trigger", time_progression_minutes = 15, effects = [ { targetType = "player", trait = "confidence", op = "add", value = 1 } ], flagEffects = [{ targetType = "player", flag = "first_morning" }] } ] }

