  { type = "dialog", content = "The house could use regular cleaning. Twenty dollars per session. I'll show you what needs doing.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "He says it like he's been waiting for her to ask. Maybe he has." },
  { type = "dialog", content = "And the food money — fifty a week. That's non-negotiable. Everyone pulls their weight.", props = { speaker = "npc", npcId = "npc_frank" } },
  { type = "paragraph", content = "His tone isn't unkind. It's practical. The same tone he uses for everything — delivering information, not opinions." }
]
