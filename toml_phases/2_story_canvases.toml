  { type = "paragraph", content = "At dinner, @frank mentions the food contribution. Not aggressive — the weight of it. He's been covering more than he should. The business that's $40,000 in debt, covering a girl who can't afford $50." },
  { type = "group", blocks = [
    { type = "paragraph", content = "She catches @frank's eye across the table. He knows the business numbers. She knows the business numbers. Neither speaks." },
    { type = "paragraph", content = "*He can't afford to cover me. I can't afford not to be covered.*" }
  ], conditions = { version = "1.0", items = [
