blocks = [
  { type = "paragraph", content = "He talks. Really talks. Not the clipped @frank sentences. The underneath ones." },
  { type = "paragraph", content = "Diana. How she looked the morning she left for Dubai. How she kissed him at the airport like she was already gone. The mortgage payment he's missed twice. The client who owes eight thousand and won't return calls." },
