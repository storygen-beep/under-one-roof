  { type = "paragraph", content = "She sits on the bed with her phone calculator and the back of a receipt." },
  { type = "paragraph", content = "Bus pass: $80 a month. Art supplies: $60. Phone bill: $45. Food contribution — @frank mentioned it at dinner, casual, like it was obvious — $50 a week." },
  { type = "paragraph", content = "That's $385 a month. She has $400." },
  { type = "paragraph", content = "*Thirteen dollars. For ten weeks.*" },
  { type = "paragraph", content = "Mom's $200 transfer — when it comes — covers half a month. Maybe. If the exchange rate cooperates. If Diana remembers." },
