[[canvases.nodes]]
id = "base"
name = "The Drive Back"
blocks = [
  { type = "paragraph", content = "Driving back from town. The road narrows to two lanes. Pine trees crowd both sides." },
  { type = "paragraph", content = "@ryan has one hand on the wheel. The radio is off. That's unusual — @ryan always has the radio on." },
  { type = "paragraph", content = "His other hand is on the bench seat between them. Close to her knee. Not touching. But close." },
  { type = "image", props = { file = "story/story_ryans_push_the_ride.jpg", search_queries = ["couple pickup truck bench seat driving rural road tension"] } },
  { type = "paragraph", content = "He glances at her. Then his hand moves. Settles on her knee. Not gripping. Just... there. Testing." },
  { type = "dialog", content = "Relax.", props = { speaker = "npc", npcId = "npc_ryan" } },
  { type = "paragraph", content = "One word. The grin is there but it's different — less cocky, more careful. Like he's calculating what happens next based on what she does in the next three seconds." },
  { type = "paragraph", content = "*His hand is on my knee. It's warm. He's watching my face, not the road.*" }
]
