[[canvases.nodes]]
id = "base"
name = "The Patterns"
blocks = [
  { type = "paragraph", content = "One week. She knows things now." },
  { type = "paragraph", content = "@frank makes coffee at five. The grinder wakes her through the floor. He's in the workshop by six, back for dinner at six sharp. His routine is the house's clock." },
  { type = "paragraph", content = "@jake hums when he draws. Something with no melody. She hears it through the wall at midnight — pencil scratching, humming, the click of his desk lamp going off." },
  { type = "paragraph", content = "@ryan is unpredictable. Some mornings he's shirtless in the kitchen. Some mornings his truck is already gone. He comes home dusty, loud, fills whatever room he's in." },
  { type = "paragraph", content = "She's learning the house. Which floorboards creak. Which doors stick. That the bathroom lock doesn't catch and the walls are thin and the kitchen is never really empty." },
  { type = "paragraph", content = "*I'm learning them. I wonder what they're learning about me.*" }
]
exit_block = { type = "location", text = "Get on with the day.", config = { destinationType = "trigger", time_progression_minutes = 60, flagEffects = [{ targetType = "player", flag = "first_week_complete" }] } }

