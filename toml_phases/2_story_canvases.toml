  { type = "paragraph", content = "His breath catches. His eyes close. The controlled man — the one who runs the house, reads the numbers, says 'Miss Chen' when he's angry — makes a sound he's never made in front of anyone." },
  { type = "paragraph", content = "She strokes him through the denim first. Feeling the shape of him. He grips the wine bottle like it's the only solid thing in the room." },
  { type = "paragraph", content = "Then the zipper. He doesn't stop her. His head falls back against the bookshelf. A book shifts behind him. Neither of them cares." },
