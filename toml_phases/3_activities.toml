    { type = "paragraph", content = "@jake freezes in the kitchen doorway. Coffee mug halfway to his mouth. His eyes go wide behind the glasses. He makes a sound — not a word, just air — and retreats so fast he bumps the doorframe. She hears him swearing softly from the kitchen." },
