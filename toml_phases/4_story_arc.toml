npc = "npc_frank"

[[story_arc.nodes]]
id = "node_frank_tease"
name = "The Floor"
chapter = "chapter_deepening"
linked_canvas = "story_first_tease_frank"
linked_flag = "frank_tease"
requires_nodes = ["node_frank_flirt"]
