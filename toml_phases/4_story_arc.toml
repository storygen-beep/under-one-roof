journal_entry = "His pencil dropped. He couldn't draw anymore. He was looking at me — not the paper. The artist ran out of art. What was left was just a boy who wanted to touch what he'd been drawing for weeks."
npc = "npc_jake"

[[story_arc.nodes]]
