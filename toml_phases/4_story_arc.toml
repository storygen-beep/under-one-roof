npc = "npc_frank"

[[story_arc.nodes]]
id = "node_frank_kiss"
name = "Whiskey and This Can't Happen"
chapter = "chapter_deepening"
linked_canvas = "story_first_kiss_frank"
linked_flag = "frank_kiss"
requires_nodes = ["node_frank_tease"]
journal_entry = "2 AM. Kitchen. Whiskey. He kissed me like a man drowning. His hand gripped the chair, not me. Because if he held me he wouldn't stop."
npc = "npc_frank"

