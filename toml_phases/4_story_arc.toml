[story_arc]
version = "1.0"

# ═══════════════════════════════════════════════════════════════
# CHAPTERS (7 chapters matching the 4-act structure)
# ═══════════════════════════════════════════════════════════════

[[story_arc.chapters]]
id = "chapter_arrival"
name = "Arrival"
mood = "neutral"
description = "One suitcase, three strangers, fifty-six days."
order = 1

[[story_arc.chapters]]
id = "chapter_settling"
name = "Settling In"
mood = "hopeful"
description = "Learning the house, the men, the routines. The math that doesn't work."
order = 2

[[story_arc.chapters]]
id = "chapter_awakening"
name = "Awakening"
mood = "tense"
description = "Bodies noticed. Lines tested. Something shifting under the surface."
order = 3

[[story_arc.chapters]]
id = "chapter_deepening"
name = "Deepening"
mood = "romantic"
description = "First flirt. First kiss. The point of no return, passed without noticing."
order = 4

[[story_arc.chapters]]
id = "chapter_crisis"
name = "Crisis"
mood = "tense"
description = "Drawings discovered. Brothers at war. The house fractures."
order = 5

[[story_arc.chapters]]
id = "chapter_convergence"
name = "Convergence"
mood = "passionate"
description = "Mom's coming home. Every moment is a last moment. Choose."
order = 6

[[story_arc.chapters]]
id = "chapter_resolution"
name = "Resolution"
mood = "peaceful"
description = "Mom's coming home. The story continues."
order = 7

# ═══════════════════════════════════════════════════════════════
# GROUPS (milestone gates — must complete X of Y before proceeding)
# ═══════════════════════════════════════════════════════════════

[[story_arc.groups]]
id = "group_settling_in"
name = "Getting Settled"
description = "Lily learns the house and its people. Must complete at least 3 settling events."
required_count = 3

[[story_arc.groups]]
id = "group_first_connections"
name = "First Connections"
description = "Building initial relationships. At least 2 NPC connections made."
required_count = 2

[[story_arc.groups]]
id = "group_crisis_events"
name = "Crisis Points"
description = "The household fractures. At least 2 crisis events must fire."
required_count = 2

[[story_arc.groups]]
id = "group_npc_discoveries"
name = "NPC Discoveries"
description = "Learning what each NPC hides. At least 2 discoveries."
required_count = 2


# ═══════════════════════════════════════════════════════════════
# STORY NODES — Act 1: Settling
# ═══════════════════════════════════════════════════════════════

[[story_arc.nodes]]
id = "node_arrival"
name = "One Suitcase"
chapter = "chapter_arrival"
linked_canvas = "opening_arrival"
linked_flag = "game_started"
journal_entry = "I arrived at the Harmon property with one suitcase and fifty-six days ahead of me. Frank shook my hand. Ryan grinned like I was a dare. Jake smiled at his shoes."
is_milestone = true

[[story_arc.nodes]]
id = "node_unpacking"
name = "Unpacking"
chapter = "chapter_arrival"
linked_canvas = "story_unpacking"
linked_flag = "unpacked"
requires_nodes = ["node_arrival"]
journal_entry = "Small room. Thin walls. Through one wall — Jake's pencil. Through the floor — Frank's dishes. The mattress smells like someone else's laundry detergent. Home for fifty-six days."

[[story_arc.nodes]]
id = "node_first_morning"
name = "The Bathroom Door"
chapter = "chapter_settling"
linked_canvas = "story_first_morning"
linked_flag = "first_morning"
requires_nodes = ["node_unpacking"]
group = "group_settling_in"
journal_entry = "The bathroom lock doesn't work. Jake was inside. He didn't stammer or blush. 'Knock.' One word. Like I'm furniture. Like I don't exist."
npc = "npc_jake"

[[story_arc.nodes]]
id = "node_bus_problem"
name = "The Bus or the Truck"
chapter = "chapter_settling"
linked_canvas = "story_bus_problem"
linked_flag = "bus_problem_discovered"
requires_nodes = ["node_first_morning"]
group = "group_settling_in"
journal_entry = "Getting to town: $2 bus ride, forty minutes. Or Ryan's truck, fifteen minutes, free. Nothing is free."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_moms_call"
name = "The Transfer's Delayed"
chapter = "chapter_settling"
linked_canvas = "story_moms_call"
linked_flag = "mom_called"
requires_nodes = ["node_bus_problem"]
group = "group_settling_in"
journal_entry = "Mom called. Transfer delayed. She sounded tired. I told her I was fine. I'm not fine."

[[story_arc.nodes]]
id = "node_the_math"
name = "Thirteen Dollars"
chapter = "chapter_settling"
linked_canvas = "story_the_math"
linked_flag = "money_crisis_realized"
requires_nodes = ["node_moms_call"]
group = "group_settling_in"
journal_entry = "$400. Monthly expenses: $385. Surplus: $13. For ten weeks. Frank offered cleaning work — $20 per session. It's not enough. But it's something."
is_milestone = true
npc = "npc_frank"

[[story_arc.nodes]]
id = "node_first_week"
name = "Routines"
chapter = "chapter_settling"
linked_canvas = "story_first_week"
linked_flag = "first_week_complete"
requires_nodes = ["node_the_math"]
group = "group_settling_in"
journal_entry = "One week. I know Frank's coffee schedule, Jake's humming, Ryan's unpredictability. I know which floorboards creak. The house is teaching me its language."
is_milestone = true

# ═══════════════════════════════════════════════════════════════
# STORY NODES — Act 2: Awakening & Deepening
# ═══════════════════════════════════════════════════════════════

[[story_arc.nodes]]
id = "node_jake_notices"
name = "The Pencil Stops"
chapter = "chapter_awakening"
linked_canvas = "story_jake_notices"
linked_flag = "drawing_started"
requires_nodes = ["node_first_week"]
is_milestone = true
journal_entry = "Jake looked at me today. Actually looked. His pencil stopped mid-line and he tore the page out. Later, in the hallway: 'I could draw you. This afternoon. If you're not busy.' Three weeks of nothing. Then that."
npc = "npc_jake"

[[story_arc.nodes]]
id = "node_first_awareness"
name = "Something Shifts"
chapter = "chapter_awakening"
linked_canvas = "story_first_awareness_jake"
linked_flag = "exposure_unlock"
requires_group = "group_settling_in"
journal_entry = "Something changed today. The way he looked at me — or the way I noticed him looking. I don't know which is worse. I don't know which I want."
is_milestone = true

[[story_arc.nodes]]
id = "node_ryan_awareness"
name = "The Creek"
chapter = "chapter_awakening"
linked_canvas = "story_first_awareness_ryan"
linked_flag = "ryan_awareness"
requires_group = "group_settling_in"
journal_entry = "Ryan at the creek. Shirt off. I couldn't look away. He knew."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_frank_awareness"
name = "The Hallway at Midnight"
chapter = "chapter_awakening"
linked_canvas = "story_first_awareness_frank"
linked_flag = "frank_awareness"
requires_group = "group_settling_in"
journal_entry = "2 AM. Sleep shirt. He looked at the hem, then my face. Just for a second. I felt it."
npc = "npc_frank"

[[story_arc.nodes]]
id = "node_jake_reference_photo"
name = "The Reference Photo"
chapter = "chapter_awakening"
linked_phone = "jake_reference_photo"
linked_flag = "jake_has_photo_1"
requires_nodes = ["node_jake_notices"]
npc = "npc_jake"
journal_entry = "He asked for a reference photo. For the drawing, he said. I sent it. The light on my collarbone, he said. He noticed the light."

[[story_arc.nodes]]
id = "node_drawing_sessions"
name = "Drawing Sessions"
chapter = "chapter_awakening"
linked_canvas = "story_drawing_milestone_1"
linked_flag = "drawing_1_complete"
requires_nodes = ["node_jake_reference_photo"]
group = "group_first_connections"
journal_entry = "Jake drew my hands today. When he showed me, I saw things I didn't know he noticed — the chip in my thumbnail, the freckle below my ear. He sees things nobody else sees."
npc = "npc_jake"

[[story_arc.nodes]]
id = "node_ryans_push"
name = "The Hand on the Knee"
chapter = "chapter_awakening"
linked_canvas = "story_ryans_push"
linked_flag = "truck_incident_complete"
requires_nodes = ["node_first_awareness"]
journal_entry = "Ryan's hand on my knee in the truck. I had three seconds to decide. Whatever I chose — that's the direction now. No going back."
is_milestone = true
npc = "npc_ryan"

# ── Ryan's Departure Arc Nodes ──

[[story_arc.nodes]]
id = "node_ryan_detour"
name = "Wrong Turn"
chapter = "chapter_awakening"
linked_canvas = "story_ryan_detour"
linked_flag = "ryan_detour"
requires_nodes = ["node_ryans_push"]
journal_entry = "Ryan missed the turn today. Stopped at a site that isn't Frank's. Talked to someone I couldn't see. 'Wrong turn.' It wasn't."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_ryan_phone"
name = "Two Weeks"
chapter = "chapter_deepening"
linked_canvas = "story_ryan_phone"
linked_flag = "ryan_phone_heard"
requires_nodes = ["node_ryan_detour"]
journal_entry = "Phone call. He pulled over, stepped out. I heard fragments through the truck door. 'Two weeks.' 'Hold the spot.' He didn't explain."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_ryan_map"
name = "Under the Seat"
chapter = "chapter_deepening"
linked_canvas = "story_ryan_map"
linked_flag = "ryan_secret_discovered"
requires_nodes = ["node_ryan_phone"]
group = "group_npc_discoveries"
is_milestone = true
journal_entry = "Map under the truck seat. A city circled in red. A job offer — his own crew, real money. He's leaving. Before Mom comes back."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_ryan_truth"
name = "Twenty-Three and Stuck"
chapter = "chapter_crisis"
linked_canvas = "story_ryan_truth"
linked_flag = "ryan_leaving_confirmed"
requires_nodes = ["node_ryan_map"]
is_milestone = true
journal_entry = "He's 23 and stuck. Dad's house, dad's jobs, dad's roads. The scar was the day he knew he'd be doing this forever. The offer is real. He leaves before Mom comes back."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_power_outage"
name = "Candlelight"
chapter = "chapter_crisis"
linked_canvas = "story_power_outage"
linked_flag = "power_outage"
requires_nodes = ["node_ryan_truth"]
journal_entry = "Storm. Candlelight. Ryan told the real story of his scar — eighteen, scared, thought his arm was broken. Frank drove him to the ER without a word. 'You were fine.' 'I know. That's why you didn't talk.' For one evening, nobody was performing."

[[story_arc.nodes]]
id = "node_ryan_ultimatum"
name = "Come With Me"
chapter = "chapter_convergence"
linked_canvas = "story_ryan_ultimatum"
linked_flag = "ryan_ultimatum_complete"
requires_nodes = ["node_ryan_truth"]
is_milestone = true
journal_entry = "'Come with me.' Not blackmail. Not leverage. A man in a truck asking someone to choose him. The only honest question anyone in this house has asked me."
npc = "npc_ryan"

[[story_arc.nodes]]
id = "node_ryan_departure"
name = "Engine Running"
chapter = "chapter_convergence"
linked_canvas = "story_ryan_departure"
linked_flag = "ryan_stayed"
requires_nodes = ["node_ryan_ultimatum"]
is_milestone = true
journal_entry = "Dawn. The truck was packed. The engine was running. What happened next changed everything."
npc = "npc_ryan"

# ── End Ryan's Departure Arc ──

[[story_arc.nodes]]
id = "node_bookkeeping"
