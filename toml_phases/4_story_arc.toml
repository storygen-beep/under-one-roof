chapter = "chapter_deepening"
linked_canvas = "story_jakes_art"
linked_flag = "saw_jakes_art"
requires_nodes = ["node_first_awareness"]
group = "group_first_connections"
journal_entry = "Jake showed me his portfolio. Not the ones of me — the real work. The creek, the workshop, Frank's hands on a coffee mug. They're actually good. He looked at me like my opinion was the only one that mattered."
npc = "npc_jake"

[[story_arc.nodes]]
id = "node_first_flirt"
name = "Crossing the Line"
chapter = "chapter_deepening"
linked_canvas = "story_first_flirt_jake"
linked_flag = "flirt_unlock"
requires_nodes = ["node_first_awareness"]
journal_entry = "I flirted. Deliberately. Not accidental, not a misunderstanding. I chose to cross that line. And I liked what I saw on the other side."
is_milestone = true

[[story_arc.nodes]]
id = "node_first_tease"
name = "The First Tease"
chapter = "chapter_deepening"
linked_canvas = "story_first_tease_jake"
linked_flag = "tease_unlock"
requires_nodes = ["node_first_flirt"]
is_milestone = true
journal_entry = "I did it on purpose. Not accidental, not a misunderstanding. I dressed for it. I positioned for it. I watched the reaction. And I liked what I saw."

# ── Per-NPC Flirt/Tease/Kiss Nodes (Ryan + Frank) ──

[[story_arc.nodes]]
id = "node_ryan_flirt"
