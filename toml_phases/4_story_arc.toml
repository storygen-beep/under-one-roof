[[story_arc.nodes]]
id = "node_drawing_milestone_5"
name = "Without Anything"
chapter = "chapter_deepening"
linked_canvas = "story_drawing_milestone_5"
linked_flag = "drawing_5_complete"
requires_nodes = ["node_jake_towel_photo"]
journal_entry = "I took off the shirt without being asked. He drew me like I was the most important thing. I was bare and I didn't feel naked. I felt seen."
npc = "npc_jake"

[[story_arc.nodes]]
id = "node_jake_deliberate_photo"
name = "The Underwear Photo"
chapter = "chapter_crisis"
linked_phone = "jake_deliberate_photo"
linked_flag = "jake_has_underwear_photo"
requires_nodes = ["node_drawing_milestone_5"]
npc = "npc_jake"
journal_entry = "No accident this time. No excuse. I chose to send it. He asked me to come to his room. The drawings aren't art anymore."

