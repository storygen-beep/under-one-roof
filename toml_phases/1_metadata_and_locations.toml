description = "45, broad shoulders, calloused hands, salt-and-pepper stubble, crow's feet around steady dark eyes. Smells like sawdust and black coffee. Flannels with rolled sleeves, work boots, jeans that fit right. The authority figure who tries to keep things appropriate — and fails."
