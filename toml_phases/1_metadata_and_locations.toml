# ═══════════════════════════════════════════════════════════════
# PHASE 1: METADATA, PLAYER, NPCs, LOCATIONS, SETTINGS & CLOTHING
# ═══════════════════════════════════════════════════════════════
# Source: Book Phases 1 (Foundation), 2 (Characters & Stats), 3 (World Design)
# Game: Under One Roof
# ═══════════════════════════════════════════════════════════════

schema_version = "0.2"
starting_canvas = "opening_arrival"

# ═══════════════════════════════════════════════════════════════
# PROJECT METADATA
# ═══════════════════════════════════════════════════════════════

[project]
id = "under_one_roof"
title = "Under One Roof"
description = """
Lily Chen, a 19-year-old art student, is stranded by circumstance at her new \
step-father's isolated rural property with his two adult sons. Her dorm flooded. \
Mom is overseas. She has $400 and nowhere else to go. Three men, thin walls, one \
shared bathroom, and an economic math that forces escalation. The house is the \
arena. Pride is the engine. Proximity does the rest.
"""

# ═══════════════════════════════════════════════════════════════
# THEME (Visual Customization)
# ═══════════════════════════════════════════════════════════════

[theme]
mode = "dark"
primary = "#c49a5c"
secondary = "#a67373"
accent = "#7a9e7e"
success = "#6aad6a"
danger = "#c45c5c"
warning = "#d4a04a"
bg = "#1a1614"
surface = "#2a2420"
surface_alt = "#362f28"
border = "#4a3f35"
text = "#e8e0d8"
text_muted = "#9a8e82"

# ═══════════════════════════════════════════════════════════════
# TIME SYSTEM
# ═══════════════════════════════════════════════════════════════

[time]
enabled = true
starting_hour = 17
starting_day = "Saturday"
starting_week = 1

# ═══════════════════════════════════════════════════════════════
# SIDEBAR
# ═══════════════════════════════════════════════════════════════

[[sidebar_items]]
type = "hint"

[[sidebar_items]]
type = "passes"

[[sidebar_items]]
type = "inventory"

# ═══════════════════════════════════════════════════════════════
# PASSES (recurring time-limited purchases)
# ═══════════════════════════════════════════════════════════════

[[passes]]
id = "gym_pass"
name = "Gym Pass"
cost = 30
duration_days = 7
icon = "🏋️"

# ═══════════════════════════════════════════════════════════════
# ITEMS (consumable inventory)
# ═══════════════════════════════════════════════════════════════

[[items]]
id = "groceries"
name = "Groceries"
icon = "🛒"
max_stack = 20

# ═══════════════════════════════════════════════════════════════
# PHONE SYSTEM
# ═══════════════════════════════════════════════════════════════

[phone]
enabled = true

[[phone.apps]]
id = "messages"
